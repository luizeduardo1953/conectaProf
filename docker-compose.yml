# docker-compose.yml — Desenvolvimento Local
#
# Use este arquivo para subir APENAS o banco de dados.
# O backend e o frontend rodam localmente com hot reload nativo.
#
# Como usar:
#   docker compose up -d
#
# Em seguida, em terminais separados:
#   cd backend  && npm run start:dev   (NestJS com hot reload)
#   cd frontend && npm run dev         (Next.js com hot reload)
#
# Para parar o banco:
#   docker compose down
#
# Para apagar os dados do banco (reset):
#   docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: conectaprof_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-conectaprof}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"       # acesso local: localhost:5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-conectaprof}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: conectaprof_postgres_data
