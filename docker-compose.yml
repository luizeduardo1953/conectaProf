version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules

    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run build && npx prisma db push && npm run seed && node dist/main.js"
    environment:
      NODE_OPTIONS: "--max-old-space-size=4096"
    mem_limit: 4096m

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_OPTIONS=--max-old-space-size=3072
    mem_limit: 4096m
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
